name: Argon
options:
  bundleIdPrefix: dev.argonapp
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: true
    CLANG_WARN_INCOMPLETE_UMBRELLA: "NO"
    ENABLE_APP_INTENTS_METADATA_GENERATION: "NO"
    GCC_TREAT_WARNINGS_AS_ERRORS: "YES"
    OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -Wno-incomplete-umbrella"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"

schemes:
  Argon:
    build:
      targets:
        Argon: all
    test:
      targets:
        - ArgonTests

targets:
  Argon:
    type: application
    platform: macOS
    # Keep Xcode user script sandboxing disabled for this target. The app bundles
    # the Rust CLI via run-script phases, and enabling the sandbox currently
    # creates a build-graph cycle around the generated CLI artifact.
    preBuildScripts:
      - name: Build vendored libghostty
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          REPO_ROOT="$(cd "$SRCROOT/../.." && pwd)"
          if [ -n "${ARGON_GHOSTTYKIT_PATH:-}" ]; then
            GHOSTTY_XCFRAMEWORK="$ARGON_GHOSTTYKIT_PATH"
          else
            GHOSTTY_XCFRAMEWORK="$REPO_ROOT/target/libghostty/native/macos/GhosttyKit.xcframework"
          fi
          if [ ! -d "$GHOSTTY_XCFRAMEWORK" ]; then
            if [ "${CONFIGURATION:-Debug}" = "Release" ]; then
              bash "$REPO_ROOT/scripts/build-libghostty.sh" --release
            else
              bash "$REPO_ROOT/scripts/build-libghostty.sh"
            fi
          fi
      - name: Build bundled argon CLI
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          REPO_ROOT="$(cd "$SRCROOT/../.." && pwd)"
          if [ "${ARGON_SKIP_BUNDLED_CLI_BUILD:-0}" = "1" ]; then
            exit 0
          fi
          if [ -n "${CARGO:-}" ] && [ -x "${CARGO}" ]; then
            CARGO_BIN="${CARGO}"
          elif [ -x "$HOME/.cargo/bin/cargo" ]; then
            CARGO_BIN="$HOME/.cargo/bin/cargo"
          elif [ -x "/opt/homebrew/bin/cargo" ]; then
            CARGO_BIN="/opt/homebrew/bin/cargo"
          elif [ -x "/usr/local/bin/cargo" ]; then
            CARGO_BIN="/usr/local/bin/cargo"
          elif command -v cargo >/dev/null 2>&1; then
            CARGO_BIN="$(command -v cargo)"
          else
            echo "error: cargo not found. Install Rust or set CARGO to an absolute cargo path." >&2
            exit 1
          fi
          export RUSTFLAGS="${RUSTFLAGS:--Dwarnings}"
          "$CARGO_BIN" build --manifest-path "$REPO_ROOT/Cargo.toml" --bin argon --release
    postBuildScripts:
      - name: Bundle Ghostty resources
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          REPO_ROOT="$(cd "$SRCROOT/../.." && pwd)"
          if [ -n "${ARGON_GHOSTTY_RESOURCES_PATH:-}" ]; then
            SRC_DIR="$ARGON_GHOSTTY_RESOURCES_PATH"
          else
            SRC_DIR="$REPO_ROOT/target/libghostty/native/share/ghostty"
          fi
          DEST_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/ghostty"
          if [ -d "$SRC_DIR" ]; then
            rm -rf "$DEST_DIR"
            cp -R "$SRC_DIR" "$DEST_DIR"
          fi
      - name: Bundle argon CLI
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          REPO_ROOT="$(cd "$SRCROOT/../.." && pwd)"
          if [ -n "${ARGON_BUNDLED_CLI_PATH:-}" ]; then
            CLI_PATH="$ARGON_BUNDLED_CLI_PATH"
          else
            CLI_PATH="$REPO_ROOT/target/release/argon"
          fi
          if [ ! -f "$CLI_PATH" ]; then
            echo "error: bundled argon CLI not found at $CLI_PATH" >&2
            exit 1
          fi
          DEST_DIR="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/bin"
          mkdir -p "$DEST_DIR"
          cp "$CLI_PATH" "$DEST_DIR/argon"
          chmod +x "$DEST_DIR/argon"
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Argon.entitlements
    dependencies:
      - sdk: Carbon.framework
      - sdk: GameController.framework
      - package: Sparkle
      - framework: ../../target/libghostty/native/macos/GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.argonapp.macos
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Argon.entitlements
        PRODUCT_NAME: Argon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        "OTHER_LDFLAGS[arch=*]": "-lstdc++ -force_load $(TARGET_BUILD_DIR)/$(ARGON_GHOSTTY_STATIC_LIB)"
        # Embedded Ghostty runtime paths used by the terminal renderer.
        ARGON_GHOSTTY_STATIC_LIB: "libghostty-fat.a"
        ARGON_GHOSTTYKIT_PATH: "$(SRCROOT)/../../target/libghostty/native/macos/GhosttyKit.xcframework"
        ARGON_GHOSTTY_RESOURCES_PATH: "$(SRCROOT)/../../target/libghostty/native/share/ghostty"
        ARGON_APPCAST_FEED_URL: ""
        SPARKLE_PUBLIC_ED_KEY: "VOqf6oj0ku8jGXlujf5+bwHAMI10fnBppdY/+7MOaZE="

  ArgonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Argon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.argonapp.macos.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Argon.app/Contents/MacOS/Argon"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ArgonUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Argon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.argonapp.macos.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Argon
    scheme:
      testTargets:
        - ArgonUITests
