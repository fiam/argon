[advisories]
# bincode is unmaintained but used internally by syntect for theme/syntax caching
ignore = ["RUSTSEC-2025-0141"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
